name = "cheffinder"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static Assets: the Vite/SSG build output in `dist/` is served directly for all
# paths except those routed to the Worker below. `_headers` and `_redirects` in
# `dist/` are honoured natively (same format as Cloudflare Pages).
[assets]
directory = "./dist"
binding = "ASSETS"
# Unmatched paths (e.g. /lead/:token) serve the SPA shell (index.html, 200).
not_found_handling = "single-page-application"
# Run the Worker for EVERY request. This is required for host-based routing:
# the Worker serves a different prerendered page per hostname (ezfind.app ->
# the landing, admin.ezfind.app -> the admin panel) and falls back to the
# static assets (via the ASSETS binding) for the chef host and all asset
# requests. With the previous path-scoped form, navigation requests like "/"
# matched a static file and were served WITHOUT invoking the Worker, so the
# per-host logic never ran. `true` puts the Worker in front of everything; it
# still serves assets through `env.ASSETS.fetch`, so SPA fallback and
# `_headers` continue to work.
run_worker_first = true

# Cron backstop for the reservation TTL sweep. Supabase pg_cron runs the same
# sweep every 5 minutes when available, but its scheduling is silently skipped
# where pg_cron isn't permitted — this trigger guarantees abandoned
# reservations always reopen (see worker/index.ts `scheduled`).
[triggers]
crons = ["*/10 * * * *"]

# Non-secret runtime variables. These live here (not the dashboard) on purpose:
# Workers Builds runs `wrangler deploy` on every push, and a deploy resets
# plaintext vars to exactly what this config declares — so dashboard-set plaintext
# vars get wiped. Anything sensitive must be a Secret (dashboard / `wrangler
# secret put`); secrets are preserved across deploys and must never go here.
[vars]
PUBLIC_BASE_URL = "https://cheffinder.oramabo9-b2c.workers.dev"
# Placeholder-checkout mode: instant click-through reservation, no real provider.
# ⚠️ LAUNCH BLOCKER: while this is "true", /api/payment/mock-complete lets
# anyone unlock client contacts WITHOUT paying. Before going live with manual
# Bit payments: delete this line and set the BIT_PHONE secret (and optionally
# BIT_LINK). See "Launch checklist" in DEPLOYMENT.md.
MOCK_PAYMENTS = "true"

# Sensitive values (SUPABASE_*, TURNSTILE_SECRET, TG_*, WA_*, ADMIN_TOKEN,
# GROW_*) are Secrets, set in the Cloudflare dashboard (or `wrangler secret put`)
# and via .dev.vars locally (see .env.example). Do not commit real secrets here.
