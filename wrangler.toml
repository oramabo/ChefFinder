name = "cheffinder"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static Assets: the Vite/SSG build output in `dist/` is served directly for all
# paths except those routed to the Worker below. `_headers` and `_redirects` in
# `dist/` are honoured natively (same format as Cloudflare Pages).
[assets]
directory = "./dist"
binding = "ASSETS"
# Unmatched paths (e.g. /lead/:token) serve the SPA shell (index.html, 200).
not_found_handling = "single-page-application"
# Force these paths to the Worker even though no static file matches them —
# otherwise `not_found_handling` would serve index.html for /api/* too.
run_worker_first = ["/api/*", "/sitemap.xml"]

# Non-secret runtime variables. These live here (not the dashboard) on purpose:
# Workers Builds runs `wrangler deploy` on every push, and a deploy resets
# plaintext vars to exactly what this config declares — so dashboard-set plaintext
# vars get wiped. Anything sensitive must be a Secret (dashboard / `wrangler
# secret put`); secrets are preserved across deploys and must never go here.
[vars]
PUBLIC_BASE_URL = "https://cheffinder.oramabo9-b2c.workers.dev"
# Placeholder-checkout mode: instant click-through reservation, no real provider.
# Remove this (and add the GROW_* secrets) when wiring real payments.
MOCK_PAYMENTS = "true"

# Sensitive values (SUPABASE_*, TURNSTILE_SECRET, TG_*, WA_*, ADMIN_TOKEN,
# GROW_*) are Secrets, set in the Cloudflare dashboard (or `wrangler secret put`)
# and via .dev.vars locally (see .env.example). Do not commit real secrets here.
